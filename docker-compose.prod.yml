services:
  backend:
    image: ${ECR_REGISTRY}/requirements-gatherer-backend:${IMAGE_TAG:-latest}
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    image: ${ECR_REGISTRY}/requirements-gatherer-frontend:${IMAGE_TAG:-latest}
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
